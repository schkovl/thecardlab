kind = "mobile"
previewPath = "/mobile/"
title = "TheCardLab Mobile"
version = "1.0.0"
id = "artifacts/thecardlab-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22754

[services.development]
run = "pnpm --filter @workspace/thecardlab-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thecardlab-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/thecardlab-mobile", "run", "serve" ]

[services.env]
PORT = "22754"
BASE_PATH = "/mobile/"
