<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TheCardLab — Architecture</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: dark; }
  body {
    background: #050914; color: #e2e8f0;
    font: 15px/1.6 -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    max-width: 1100px; margin: 0 auto; padding: 32px 24px 96px;
  }
  h1, h2, h3 { color: #fff; font-family: "Space Grotesk", system-ui, sans-serif; letter-spacing: -0.01em; }
  h1 { font-size: 36px; border-bottom: 1px solid #1e3a5f; padding-bottom: 12px; margin-top: 32px; }
  h2 { font-size: 24px; margin-top: 48px; color: #00e5ff; }
  h3 { font-size: 18px; color: #22d3a6; }
  pre, code { font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace; }
  pre {
    background: #0d1a31; border: 1px solid #1e3a5f; border-radius: 12px;
    padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.5;
  }
  code { background: #0d1a31; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  pre code { background: transparent; padding: 0; }
  a { color: #00e5ff; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  th, td { border: 1px solid #1e3a5f; padding: 8px 12px; text-align: left; font-size: 13px; }
  th { background: #0d1a31; color: #00e5ff; }
  .mermaid {
    background: #0d1a31; border: 1px solid #1e3a5f; border-radius: 12px;
    padding: 24px; margin: 16px 0; text-align: center;
  }
  hr { border: 0; border-top: 1px solid #1e3a5f; margin: 32px 0; }
</style>
</head>
<body>
<div id="root">Loading…</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    themeVariables: {
      background: "#0d1a31",
      primaryColor: "#0d1a31",
      primaryTextColor: "#e2e8f0",
      primaryBorderColor: "#00e5ff",
      lineColor: "#22d3a6",
      secondaryColor: "#050914",
      tertiaryColor: "#1e3a5f",
      fontFamily: "JetBrains Mono, ui-monospace, monospace",
    },
    flowchart: { htmlLabels: true, curve: "basis" },
    sequence: { actorFontSize: 14, noteFontSize: 13, messageFontSize: 13 },
  });

  const md = await fetch("ARCHITECTURE.md").then(r => r.text());

  // Tell marked to leave mermaid blocks alone
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => {
    if (lang === "mermaid") return `<div class="mermaid">${code}</div>`;
    return `<pre><code class="lang-${lang ?? ""}">${code.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]))}</code></pre>`;
  };
  document.getElementById("root").innerHTML = marked.parse(md, { renderer });
  await mermaid.run({ querySelector: ".mermaid" });
</script>
</body>
</html>
