name: Mobile Build (EAS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options: [ios, android, all]
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options: [development, preview, production]
      submit:
        description: "Submit to store after build"
        required: false
        default: false
        type: boolean

concurrency:
  group: mobile-build-${{ github.event.inputs.platform }}-${{ github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/thecardlab-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Write Play service account key
        if: ${{ inputs.platform != 'ios' && inputs.submit == true }}
        env:
          PLAY_KEY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_KEY_JSON" > ./google-play-service-account.json

      - name: EAS build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait

      - name: EAS submit
        if: ${{ inputs.submit == true }}
        run: eas submit --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --latest --non-interactive
