name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PORT: "5173"
      BASE_PATH: "/"
      VITE_CLERK_PUBLISHABLE_KEY: "pk_test_dmFsaWQuY2xlcmsuYWNjb3VudHMuZGV2JA"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm -r --filter "!@workspace/thecardlab-mobile" --if-present run build
