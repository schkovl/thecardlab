name: Deploy API to Fly

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-deploy.yml"
  workflow_dispatch:

concurrency:
  group: api-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config artifacts/api-server/fly.toml --dockerfile artifacts/api-server/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
