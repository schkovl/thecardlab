packages:
  - 'artifacts/*'
  - 'lib/*'

allowBuilds:
  '@clerk/shared': true
  browser-tabs-lock: true
  bufferutil: true
  core-js: true
  esbuild: true
  esbuild-plugin-pino: true
  utf-8-validate: true

catalog:
